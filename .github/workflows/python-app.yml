name: Python 微信推送（带代码检查）

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间8点自动运行（UTC 0点）

permissions:
  contents: read

jobs:
  # 第一步：代码检查（失败会提示，但不阻断推送）
  lint-code:
    runs-on: ubuntu-latest
    continue-on-error: true  # 检查失败也继续执行推送任务
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: 安装代码检查依赖
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: 代码语法检查（flake8）
      run: |
        # 检查严重错误（语法错误/未定义变量），打印详细信息
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 其他问题仅作为警告（不阻断）
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # 第二步：运行微信推送（无论检查是否失败，都执行）
  send-wechat:
    needs: lint-code  # 依赖代码检查任务（等检查完成再推送）
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: 安装项目运行依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: 运行微信推送脚本
      run: |
        python main.py
